name: Update Homebrew Formula

on:
  push:
    tags:
      - 'v*'

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for PyPI to process the package
        run: sleep 120

      - name: Update formula in tap
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: csvtrim
          formula-path: Formula/csvtrim.rb
          homebrew-tap: KimTholstorf/homebrew-csvtrim
          tag-name: ${{ github.ref_name }}
          download-url: https://files.pythonhosted.org/packages/source/c/csvtrim/csvtrim-$VERSION.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
